{% extends 'adminpanel/base.html' %}

{% block title %}Delete Service{% endblock %}

{% block content %}
<div class="row justify-content-center">
    <div class="col-md-6">
        <div class="card border-danger">
            <div class="card-header bg-danger text-white">
                <h4 class="mb-0"><i class="fa-solid fa-triangle-exclamation"></i> Confirm Delete</h4>
            </div>
            <div class="card-body">
                <p>Are you sure you want to delete the service:</p>
                <h5 class="text-danger">{{ service.title }}</h5>
                <p class="text-muted">This action cannot be undone.</p>

                <form method="post">
                    {% csrf_token %}
                    <div class="d-flex gap-2">
                        <button type="submit" class="btn btn-danger">
                            <i class="fa-solid fa-trash-can"></i> Yes, Delete
                        </button>
                        <a href="{% url 'admin_service_list' %}" class="btn btn-outline-secondary">Cancel</a>
                    </div>
                </form>
            </div>
        </div>
    </div>
</div>
{% endblock %}
