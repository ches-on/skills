{% extends 'base.html' %}
{% load static %}

{% block title %}Delete Product{% endblock %}

{% block content %}
<div class="row">
    <div class="col-md-6 offset-md-3">
        <div class="card border-danger">
            <div class="card-body">
                <h5 class="card-title text-danger">Confirm Deletion</h5>
                <p class="card-text">
                    Are you sure you want to delete the product <strong>"{{ product.name }}"</strong>?
                </p>
                <p class="card-text text-muted">This action cannot be undone.</p>
            </div>
        </div>

        <form method="POST" class="mt-3">
            {% csrf_token %}
            <button type="submit" class="btn btn-danger">Yes, Delete</button>
            <a href="{% url 'product_detail' product.pk %}" class="btn btn-outline-secondary">Cancel</a>
        </form>
    </div>
</div>
{% endblock %}
